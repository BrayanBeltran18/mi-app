<div class="crear-tarjeta">
  <h3>Agregar Tarjeta</h3>
  <input type="text" [(ngModel)]="nuevoNombre" placeholder="Nombre" />
  <input type="number" [(ngModel)]="nuevaEdad" placeholder="Edad" />
  <button (click)="agregarTarjeta()">Agregar</button>
</div>

<div class="lista-tarjetas">
  @for (tarjeta of tarjetas; track tarjeta.nombre) {
    <app-tarjeta [nombre]="tarjeta.nombre" [edad]="tarjeta.edad"></app-tarjeta>
  }
</div>
